name: Day 3 - Real CI Pipeline

on:
  push:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Verify Node version
        run: node -v

      - name: Install dependencies
        run: npm install

      - name: Build application
        run: npm run build
        

      - name: Run tests
        run: npm test
