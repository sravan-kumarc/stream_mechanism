name: MultiJob CI Pipeline

on:
  workflow_dispatch:
    inputs:
      environments:
       description: choose something
       required: true
       default: dev
       type: choice
       options:
         - dev
         - uat
         - prelive
      artifact_tag:
        required: true
      

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      - name: Run Tests
        run: npm test


  test:
    runs-on: ubuntu-latest
    needs: build
      

    steps:
      - name: Run Additional Tests
        run: echo "Running additional tests..."
      
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install Dependencies
        run: npm install
      - name: Run Tests
        run: npm test
        

  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Deploy Application
        run: echo "Deploying application..."
