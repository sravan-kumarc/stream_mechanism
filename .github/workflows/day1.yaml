name: Day 1 - Hello Workflow

on:
  push:

jobs:
  hello-job:
    runs-on: self-hosted

    steps:
      - name: Print message
        run: echo "Hello Sravan, CI/CD started!"
      
      - name: Show system info
        run: uname -a

      - name: Date
        run: date

      - name: Verify runner
        run: |
         echo "Runner: $RUNNER_NAME"
         echo "OS: $RUNNER_OS"
